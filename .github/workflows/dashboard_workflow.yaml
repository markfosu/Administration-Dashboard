name: Node App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Build Docker image
        run: docker build -t dashboard-app:v1 .

      - name: List Docker images
        run: docker images

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: dashboard-app:v1
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          scanners: vuln

  deploy:
    needs: test-and-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy app to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/dashboard-app

      - name: Write nginx config
        run: |
          cat > /tmp/dashboard-app.nginx << 'NGINXCONF'
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          NGINXCONF
          scp /tmp/dashboard-app.nginx ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/dashboard-app.nginx

      - name: Deploy app on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            APP_DIR="/home/${{ secrets.EC2_USER }}/dashboard-app"

            sudo apt update

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt install -y nodejs
            fi

            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt install -y nginx
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            cd "$APP_DIR"
            npm install --omit=dev

            pm2 delete dashboard-app || true
            pm2 start server.js --name dashboard-app
            pm2 save

            sudo mv /tmp/dashboard-app.nginx /etc/nginx/sites-available/dashboard-app
            sudo ln -sf /etc/nginx/sites-available/dashboard-app /etc/nginx/sites-enabled/dashboard-app
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl restart nginx
            sudo systemctl enable nginx

            pm2 startup systemd -u $USER --hp $HOME >/dev/null 2>&1 || true
            pm2 save
          EOF

# this workflow will run on every push and pull request to the main branch. It will run tests, perform a SonarQube scan, a Snyk scan, build a Docker image, and perform a Trivy scan. If all checks pass and it's a push to the main branch, it will deploy the app to an EC2 instance using SSH.