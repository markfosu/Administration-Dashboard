name: Node App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Build Docker image
        run: docker build -t dashboard:v1 .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: dashboard-app:v1
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    needs: test-and-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy app to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/dashboard-app

      - name: Deploy app on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            cd /home/${{ secrets.EC2_USER }}/dashboard-app
            npm install --omit=dev
            pm2 delete dashboard-app || true
            pm2 start server.js --name dashboard-app
            pm2 save
          EOF


# this workflow will run on every push and pull request to the main branch. It will run tests, perform a SonarQube scan, a Snyk scan, build a Docker image, and perform a Trivy scan. If all checks pass and it's a push to the main branch, it will deploy the app to an EC2 instance using SSH.